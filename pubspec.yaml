version: 0.0.1
homepage: https://github.com/useradgents/ua_debug_view

environment:
  sdk: ^3.7.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  package_info_plus: '>=8.3.0 <10.0.0'
  shared_preferences: ^2.5.2
  sensors_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
